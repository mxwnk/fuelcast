<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="FuelCast — dial in your carbs, glucose:fructose ratio and race-day fueling timeline for triathlon, cycling and running."
    />
    <title>FuelCast — Endurance Fueling Calculator</title>
    <script>
      // Set theme before first paint to avoid a flash of the wrong mode
      ;(function () {
        var stored = localStorage.getItem('fuelcast-theme')
        var dark =
          stored === 'dark' ||
          (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches)
        if (dark) document.documentElement.classList.add('dark')
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
