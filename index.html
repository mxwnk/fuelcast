<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="theme-color"
      content="#f2f1ec"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#0b0d10"
      media="(prefers-color-scheme: dark)"
    />
    <meta
      name="description"
      content="FuelCast — dial in your carbs, glucose:fructose ratio and race-day fueling timeline for triathlon, cycling and running."
    />
    <link rel="canonical" href="https://fuelcast.run/" />
    <title>FuelCast — Endurance Fueling Calculator</title>

    <!-- Open Graph / social link previews (crawlers read static HTML, absolute URLs required) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="FuelCast" />
    <meta property="og:title" content="FuelCast — Endurance Fueling Calculator" />
    <meta
      property="og:description"
      content="Never bonk again. Race-day fueling plans in 30 seconds — carb targets, glucose:fructose ratio, hydration and a race timeline for triathlon, cycling and running. No account, works offline."
    />
    <meta property="og:url" content="https://fuelcast.run/" />
    <meta property="og:image" content="https://fuelcast.run/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="FuelCast — Never bonk again." />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="de_DE" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FuelCast — Endurance Fueling Calculator" />
    <meta
      name="twitter:description"
      content="Never bonk again. Race-day carb, glucose:fructose, hydration and timeline planning — free, no account, works offline."
    />
    <meta name="twitter:image" content="https://fuelcast.run/og.png" />

    <script>
      // Set theme before first paint to avoid a flash of the wrong mode
      ;(function () {
        var stored = localStorage.getItem('fuelcast-theme')
        var dark =
          stored === 'dark' ||
          (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches)
        if (dark) document.documentElement.classList.add('dark')
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
